version: "3.9"

services:

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  customer:
    image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/r2sqs-eb-customer:latest
    container_name: customer
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      SERVICE_NAME: customer
      AWS_REGION: ${AWS_REGION}
      EVENT_BUS_NAME: ${EVENT_BUS_NAME}
      APP_SECRET: ${APP_SECRET}
      CUSTOMER_SERVICE: CUSTOMER_SERVICE
      MONGO_URI: mongodb://${DOCDB_USERNAME}:${DOCDB_PASSWORD}@${DOCDB_ENDPOINT}:27017/customer?tls=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false&authSource=admin
      SQS_QUEUE_URL: ${ORDER_CREATED_QUEUE_URL}

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8001/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - app-network

  products:
    image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/r2sqs-eb-products:latest
    container_name: products
    restart: unless-stopped
    ports:
      - "8002:8002"
    depends_on:
      - redis
    environment:
      PORT: 8002
      SERVICE_NAME: products
      AWS_REGION: ${AWS_REGION}
      EVENT_BUS_NAME: ${EVENT_BUS_NAME}
      APP_SECRET: ${APP_SECRET}
      SHOPPING_SERVICE: SHOPPING_SERVICE
      MONGO_URI: mongodb://${DOCDB_USERNAME}:${DOCDB_PASSWORD}@${DOCDB_ENDPOINT}:27017/products?tls=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false&authSource=admin
      SQS_QUEUE_URL: ${ORDER_CREATED_PRODUCTS_QUEUE_URL}
      CACHE_INVALIDATED_QUEUE_URL: ${CACHE_INVALIDATED_QUEUE_URL}
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8002/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - app-network

  shopping:
    image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/r2sqs-eb-shopping:latest
    container_name: shopping
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      SERVICE_NAME: shopping
      AWS_REGION: ${AWS_REGION}
      EVENT_BUS_NAME: ${EVENT_BUS_NAME}
      APP_SECRET: ${APP_SECRET}
      SHOPPING_SERVICE: SHOPPING_SERVICE
      MONGO_URI: mongodb://${DOCDB_USERNAME}:${DOCDB_PASSWORD}@${DOCDB_ENDPOINT}:27017/shopping?tls=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false&authSource=admin
      SQS_QUEUE_URL: ${CUSTOMER_CREATED_QUEUE_URL}

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8003/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - app-network

  gateway:
    image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/r2sqs-eb-gateway:latest
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      customer:
        condition: service_healthy
      products:
        condition: service_healthy
      shopping:
        condition: service_healthy
    environment:
      PORT: 8000
      CUSTOMER_SERVICE_URL: ${CUSTOMER_SERVICE_URL:-http://customer:8001}
      PRODUCT_SERVICE_URL: http://products:8002
      SHOPPING_SERVICE_URL: ${SHOPPING_SERVICE_URL:-http://shopping:8003}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
