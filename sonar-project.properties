# ============================================================
# SonarQube Project Configuration
# ============================================================

sonar.projectKey=r2sqs-eb
sonar.projectName=r2sqs-eb Microservices
sonar.projectVersion=1.0

# Source directories (all three microservices)
sonar.sources=customer/src,products/src,shopping/src

# Exclude generated/third-party code
sonar.exclusions=**/node_modules/**,**/*.test.js,**/coverage/**,**/dist/**

# Language
sonar.language=js
sonar.javascript.file.suffixes=.js

# Coverage (optional — if you add jest with lcov)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Block pipeline if quality gate fails
sonar.qualitygate.wait=true
